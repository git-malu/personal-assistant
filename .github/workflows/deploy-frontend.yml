name: Deploy Frontend to OBS

on:
  push:
    branches: [main]
    paths:
      - "personal-assistant-client/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: personal-assistant-client/package-lock.json

      - name: Install dependencies
        working-directory: personal-assistant-client
        run: npm ci

      - name: Type check
        working-directory: personal-assistant-client
        run: npx tsc --noEmit

      - name: Build
        working-directory: personal-assistant-client
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Verify build output
        working-directory: personal-assistant-client
        run: |
          test -f dist/index.html || (echo "❌ dist/index.html missing" && exit 1)
          echo "✅ Build output:"
          ls -la dist/

      - name: Upload to OBS
        working-directory: personal-assistant-client
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HUAWEICLOUD_SDK_AK }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HUAWEICLOUD_SDK_SK }}
          AWS_DEFAULT_REGION: cn-southwest-2
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          aws configure set s3.addressing_style virtual

          aws s3 sync dist/ s3://personal-assistant-web-chat/ \
            --endpoint-url=https://obs.cn-southwest-2.myhuaweicloud.com \
            --acl public-read \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

          # index.html: no-cache + correct content type
          aws s3 cp dist/index.html s3://personal-assistant-web-chat/index.html \
            --endpoint-url=https://obs.cn-southwest-2.myhuaweicloud.com \
            --acl public-read \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

          echo "✅ Uploaded to obs://personal-assistant-web-chat/"

      - name: Smoke test
        run: |
          DOMAIN="https://chat.resource-governance.cloud"

          # index.html accessible
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' "$DOMAIN/index.html")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ index.html returned $HTTP_CODE"
            exit 1
          fi
          echo "✅ index.html: 200"

          # SPA fallback: /chat should return 200 (not 404)
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' "$DOMAIN/chat")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️  SPA fallback returned $HTTP_CODE (check OBS Error document config)"
          else
            echo "✅ SPA fallback (/chat): 200"
          fi

          echo "✅ Frontend deployed: $DOMAIN"
