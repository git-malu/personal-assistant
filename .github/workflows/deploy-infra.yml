name: Deploy Infrastructure

on:
  pull_request:
    paths:
      - "personal-assistant-infra/**"
      - ".github/workflows/deploy-infra.yml"
  push:
    branches: [main]
    paths:
      - "personal-assistant-infra/**"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch:

# 防止并发执行导致 state 冲突
concurrency:
  group: deploy-infra
  cancel-in-progress: false

jobs:
  tofu:
    runs-on: ubuntu-latest

    env:
      # OBS S3-compatible backend 认证
      AWS_ACCESS_KEY_ID: ${{ secrets.HUAWEICLOUD_SDK_AK }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.HUAWEICLOUD_SDK_SK }}
      # HuaweiCloud Provider 认证
      HW_ACCESS_KEY: ${{ secrets.HUAWEICLOUD_SDK_AK }}
      HW_SECRET_KEY: ${{ secrets.HUAWEICLOUD_SDK_SK }}
      TF_VAR_region: "cn-southwest-2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "~> 1.9"

      - name: Ensure state bucket exists
        run: |
          aws s3 mb s3://pa-terraform-state \
            --endpoint-url=https://obs.cn-southwest-2.myhuaweicloud.com \
            --region cn-southwest-2 2>/dev/null || true

      - name: tofu init
        working-directory: personal-assistant-infra
        run: tofu init

      - name: tofu validate
        working-directory: personal-assistant-infra
        run: tofu validate

      - name: tofu fmt check
        working-directory: personal-assistant-infra
        run: tofu fmt -check -recursive

      - name: tofu plan
        working-directory: personal-assistant-infra
        run: tofu plan -input=false

      - name: tofu apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: personal-assistant-infra
        run: tofu apply -auto-approve -input=false
