default_agent: personal-assistant
agents:
  personal-assistant:
    base:
      name: personal-assistant
      entrypoint: agent:app
      dependency_file: pyproject.toml
      region: cn-southwest-2
      platform: linux/arm64
      language: python3
      base_image: ghcr.io/astral-sh/uv:python3.12-bookworm
      container_runtime: docker
    swr_config:
      organization_auto_create: true
      organization: personal-assistant-org
      repository_auto_create: true
      repository: agent_personal_assistant
    runtime:
      arch: arm64
      agent_gateway_id: null
      agent_id: 6aded8c0-e2a6-4878-8553-7deac60b0dd4
      execution_agency_name: null
      invoke_config:
        protocol: HTTP
        port: 8080
        file_transfer_config: null
        url_match_type: ACCURATE_MATCH
      network_config:
        network_mode: PUBLIC
        vpc_config:
          vpc_id: null
          subnet_id: null
          security_group_id: []
      identity_configuration:
        authorizer_type: CUSTOM_JWT
        authorizer_configuration:
          custom_jwt:
            discovery_url: https://login.microsoftonline.com/2a1d3739-88c5-4314-b921-acbeac0abbfa/v2.0/.well-known/openid-configuration
            allowed_audience:
            - 3a99a511-926c-475c-b6bc-325a037f574d
            allowed_clients:
            - 3a99a511-926c-475c-b6bc-325a037f574d
            allowed_scopes:
            - openid
            - profile
            - email
          key_auth:
            api_keys:
            - api_key: pa-dev-api-key-2026
              api_key_name: dev-key
      observability:
        tracing:
          enabled: true
        metrics:
          enabled: true
        logs:
          enabled: true
      artifact_source:
        url: swr.cn-southwest-2.myhuaweicloud.com/personal-assistant-org/agent_personal_assistant:latest
        commands: []
      environment_variables:
      - key: DEEPSEEK_API_KEY
        value: xxxxxxxxxxxxxxxxxxxxxxx
      - key: MODEL_API_KEY
        value: xxxxxxxxxxxxxxxxxxxxxxx
      - key: MODEL_NAME
        value: deepseek-v4-pro
      - key: MODEL_URL
        value: https://api.modelarts-maas.com/openai/v1
      - key: CORS_ALLOWED_ORIGINS
        value: https://resource-governance.cloud,https://agentarts-personal-assistant.netlify.app
      tags:
      - key: app
        value: personal-assistant
      - key: env
        value: dev
