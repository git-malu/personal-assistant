# Personal Assistant — LLM Provider 配置
# 详见 ADR-011: 多 LLM Provider 可配置架构
llm:
  default: maas  # 默认 provider。可选值：maas | deepseek
  providers:
    maas:
      base_url: https://api.modelarts-maas.com/openai/v1
      api_key_env: MAAS_API_KEY
      model: deepseek-v4-pro
    deepseek:
      base_url: https://api.deepseek.com
      api_key_env: DEEPSEEK_API_KEY
      model: deepseek-chat

# ── OBS 对象存储配置 ──
# 详见 Feature 10: Outbound Email + OBS
obs:
  endpoint: https://obs.cn-southwest-2.myhuaweicloud.com
  sts_provider_name: huaweicloud-sts-provider
