<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                Helvetica, Arial, sans-serif;
            background: #e5e5ea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 860px;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
        }

        #chat-header {
            background: #007aff;
            color: #ffffff;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            flex-shrink: 0;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.5;
            word-break: break-word;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: #007aff;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #e5e5ea;
            color: #000000;
            border-bottom-left-radius: 4px;
        }

        #chat-input-area {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid #d1d1d6;
            flex-shrink: 0;
            background: #f9f9f9;
        }

        #user-input {
            flex: 1;
            border: 1px solid #d1d1d6;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 120px;
            min-height: 40px;
            line-height: 1.4;
        }

        #user-input:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.15);
        }

        #send-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: #007aff;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        #send-btn:hover {
            background: #0056cc;
        }

        #send-btn:disabled {
            background: #a0c4ff;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-header">Personal Assistant</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <textarea
                id="user-input"
                placeholder="输入消息..."
                rows="1"
            ></textarea>
            <button id="send-btn" title="发送">&#10148;</button>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById("chat-messages");
        const inputEl = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");

        let currentEventSource = null;

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addMessage(role, content) {
            const div = document.createElement("div");
            div.className = "message " + role;
            div.textContent = content;
            messagesEl.appendChild(div);
            scrollToBottom();
            return div;
        }

        function closeConnection() {
            if (currentEventSource) {
                currentEventSource.close();
                currentEventSource = null;
            }
            setInputEnabled(true);
        }

        function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            // Close any existing stream
            if (currentEventSource) {
                currentEventSource.close();
                currentEventSource = null;
            }

            // Add user message
            addMessage("user", message);
            inputEl.value = "";

            // Create empty assistant bubble
            const assistantBubble = addMessage("assistant", "");
            setInputEnabled(false);

            // Start SSE stream
            const url =
                "/api/chat/stream?q=" + encodeURIComponent(message);

            currentEventSource = new EventSource(url);

            currentEventSource.onmessage = function (event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data.error) {
                        assistantBubble.textContent = "错误: " + data.error;
                        closeConnection();
                        return;
                    }
                    if (data.token) {
                        assistantBubble.textContent += data.token;
                        scrollToBottom();
                    }
                    if (data.done) {
                        closeConnection();
                    }
                } catch (e) {
                    // Ignore parse errors
                }
            };

            currentEventSource.onerror = function () {
                closeConnection();
                if (!assistantBubble.textContent) {
                    assistantBubble.textContent = "抱歉，连接出现问题，请重试。";
                }
            };
        }

        // Send button click
        sendBtn.addEventListener("click", sendMessage);

        // Enter to send, Shift+Enter for newline
        inputEl.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
